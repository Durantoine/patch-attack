# Base configuration for patch attack project

project:
  name: "patch-attack"
  version: "0.1.0"
  description: "Adversarial patch attack on computer vision models"

# Model configuration
model:
  name: "resnet50"
  pretrained: true
  num_classes: 1000
  device: "cuda"

# Training configuration
training:
  batch_size: 32
  num_epochs: 100
  learning_rate: 0.001
  optimizer: "adam"
  weight_decay: 0.0001
  scheduler: "cosine"

# Patch configuration
patch:
  size: 50  # patch size in pixels
  position: "random"  # random, center, corner
  attack_type: "untargeted"  # untargeted, targeted
  target_class: null

# Data configuration
data:
  dataset: "imagenet"
  data_dir: "data/raw"
  processed_dir: "data/processed"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  num_workers: 4

# Logging configuration
logging:
  use_mlflow: true
  experiment_name: "patch-attack-experiments"
  log_dir: "mlruns"
  save_checkpoints: true
  checkpoint_dir: "results"

# Random seed
seed: 42
